version: '3.3'

services:
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fastapi-app
    command: fastapi dev main.py --host 0.0.0.0 --port 8000
    working_dir: /app
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - db
    environment:
      - PYTHONPATH=/app
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - DATABASE_URL=postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/ecommerce_db
    restart: unless-stopped
    volumes:
    - /ecom:/app
    env_file:
    - .env

  db:
    image: postgres:16-alpine
    container_name: postgres-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ecommerce_db
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecommerce_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    env_file:
    - .env

  redis:
    image: redis:7.0.14-alpine
    container_name: redis-server
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: celery-worker
    command: celery -A backend.infrastructure.celery.celery_app worker -l info -P solo -Q celery
    working_dir: /app
    depends_on:
      - redis
      - db
    user: "1000:1000"
    environment:
      - PYTHONPATH=/app
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - DATABASE_URL=postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/ecommerce_db
    restart: unless-stopped
    env_file:
    - .env
    volumes:
    - /ecom:/app

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: celery-beat
    command: celery -A backend.infrastructure.celery.celery_app beat -l info -S redbeat.RedBeatScheduler
    working_dir: /app
    depends_on:
      - redis
      - db
    user: "1000:1000"
    environment:
      - PYTHONPATH=/app
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - DATABASE_URL=postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/ecommerce_db
    restart: unless-stopped
    env_file:
    - .env
    volumes:
    - /ecom:/app

  order-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: order-worker
    command: python -m backend.workers.order_worker
    working_dir: /app
    depends_on:
      - redis
      - db
    user: "1000:1000"
    environment:
      - PYTHONPATH=/app
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - DATABASE_URL=postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/ecommerce_db
    restart: unless-stopped
    env_file:
    - .env
    volumes:
    - /ecom:/app

volumes:
  redis-data:
  postgres_data: